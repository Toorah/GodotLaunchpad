<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Godot Launchpad</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <g transform="rotate(45 12 12)">
              <path d="M12 2.5c2.6 2.3 3.9 5.4 3.9 8.7V14a1.6 1.6 0 0 1-1.6 1.6H9.7A1.6 1.6 0 0 1 8.1 14v-2.8c0-3.3 1.3-6.4 3.9-8.7Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"/>
              <circle cx="12" cy="9.7" r="1.7" stroke="currentColor" stroke-width="1.5"/>
              <path d="M8.1 12.6 5.9 15.8l2.2.7M15.9 12.6l2.2 3.2-2.2.7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M12 18.3v2.7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            </g>
          </svg>
          <span class="brand-name">Godot Launchpad</span>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item" data-view="projects">
            <span class="nav-icon">▦</span><span>Projects</span>
          </button>
          <button class="nav-item" data-view="engines">
            <span class="nav-icon">⚙</span><span>Engines</span>
          </button>
          <button class="nav-item" data-view="settings">
            <span class="nav-icon">⚒</span><span>Settings</span>
          </button>
        </nav>
        <div class="sidebar-footer">
          <span class="app-version">v0.1.0</span>
        </div>
      </aside>
      <main id="view-root" class="view-root"></main>
    </div>
    <div id="modal-root"></div>
    <div id="toast-root"></div>
  </body>
</html>
